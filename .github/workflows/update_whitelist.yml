name: Update ip

on:
  schedule:
    # 姣忓ぉ 00:00 鍜?12:00 UTC 鎵ц (鍖椾含鏃堕棿 08:00 鍜?20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # 鍏佽鎵嬪姩瑙﹀彂

permissions:
  contents: write

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Node Resolver
        env:
          AIRPORT1: ${{ secrets.AIRPORT1 }}
          AIRPORT2: ${{ secrets.AIRPORT2 }}
        run: |
          python scripts/resolve_nodes.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_routes.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Scheduled Updates"
            git fetch origin master
            git rebase origin/master
            git push origin HEAD:master
          else
            print "No changes to commit."
          fi

