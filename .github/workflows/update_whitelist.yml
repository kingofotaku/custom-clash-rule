name: Update Airport Whitelist Nodes

on:
  schedule:
    # 每天 00:00 和 12:00 UTC 执行 (北京时间 08:00 和 20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Node Resolver
        env:
          AIRPORT1: ${{ secrets.AIRPORT1 }}
          AIRPORT2: ${{ secrets.AIRPORT2 }}
        run: |
          python scripts/resolve_nodes.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add airport_nodes.yaml
          # 仅当文件有变动时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update airport whitelist IPs" && git push)
